<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos | Dr. Wilho Amorim Vitório</title>
    <meta name="description" content="Registro visual da trajetória e infraestrutura do Dr. Wilho Amorim Vitório. Advocacia Criminal Estratégica.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        dark: '#0a0a0a',
                        'dark-card': '#1a1a1a',
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .glass-card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .text-gradient-gold {
            background: linear-gradient(to right, #D4AF37, #F9E2AF, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gold-gradient {
            background: linear-gradient(to right, #D4AF37, #F9E2AF, #D4AF37);
        }
        .hero-pattern {
            background-image: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-dark text-gray-200 font-sans selection:bg-gold selection:text-dark">

    <!-- Header (Identidade do Site Principal) -->
    <header class="fixed w-full z-50 bg-dark/80 backdrop-blur-md border-b border-gold/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="flex flex-col">
                    <span class="text-sm font-bold tracking-widest uppercase">Dr. Wilho</span>
                    <span class="text-[10px] text-gold uppercase tracking-[0.2em]">OAB/SP 312.144</span>
                </div>
            </div>
            <nav class="flex space-x-4 text-xs font-semibold uppercase tracking-wider">
                <a href="index.html" class="text-gold border border-gold/30 px-4 py-1">Galeria</a>
                <a href="../Site adv wilho/index.html" class="hover:text-gold transition-colors py-1">Site Principal</a>
            </nav>
        </div>
    </header>

    <!-- Hero Galeria -->
    <section class="relative pt-32 pb-12 hero-pattern">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="inline-flex items-center space-x-2 bg-gold/10 border border-gold/20 px-4 py-1 rounded-full text-gold text-[10px] font-bold uppercase tracking-[0.2em] mb-6">
                <i data-lucide="camera" class="w-3 h-3"></i>
                <span>Registros Visuais</span>
            </div>
            <h1 class="text-4xl md:text-6xl font-serif font-bold text-gradient-gold mb-4">Galeria de Fotos</h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-sm md:text-base leading-relaxed">
                Acompanhe os registros da nossa trajetória, estrutura e atuação profissional dedicada à defesa estratégica.
            </p>
        </div>
    </section>

    <!-- Galeria Principal -->
    <section class="py-12 bg-dark min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Fotos serão inseridas via JavaScript -->
            </div>
        </div>
    </section>

    <!-- Modal de Visualização (Lightbox) -->
    <div id="lightbox-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 md:p-8">
        <div class="absolute inset-0 bg-dark/95 backdrop-blur-sm" onclick="closeLightbox()"></div>
        <div class="relative max-w-5xl w-full h-full flex flex-col items-center justify-center">
            <button onclick="closeLightbox()" class="absolute top-0 right-0 m-4 text-white/50 hover:text-gold transition-colors z-[110]">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl animate-zoom-in">
            <h3 id="lightbox-title" class="text-white font-serif text-xl md:text-2xl mt-6 italic text-center"></h3>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-12 border-t border-gold/10 text-center bg-dark">
        <p class="text-[10px] text-gray-600 uppercase tracking-[0.3em]">
            &copy; 2026 Dr. Wilho Amorim Vitório. Galeria de Fotos Oficial.
        </p>
    </footer>

    <!-- Scripts -->
    <script>
        lucide.createIcons();

        const initialPhotos = [
            { url: 'fotos/Foto dele 2.jpeg', title: 'Dr. Wilho Amorim' },
            { url: 'fotos/Foto dele 3.jpeg', title: 'Atuação Criminal' },
            { url: 'fotos/WhatsApp Image 2026-03-19 at 20.23.19.jpeg', title: 'Infraestrutura Sede' },
            { url: 'fotos/WhatsApp Image 2026-03-25 at 19.11.43.jpeg', title: 'Atendimento Especializado' },
            { url: 'fotos/WhatsApp Image 2026-03-19 at 20.23.20 (2).jpeg', title: 'Escritório Detalhes' }
        ];

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            
            grid.innerHTML = initialPhotos.map((photo, index) => `
                <div onclick="openLightbox('${photo.url}', '${photo.title}')" class="group relative overflow-hidden rounded-xl border border-gold/10 glass-card aspect-square animate-fade-in cursor-pointer" style="animation-delay: ${index * 0.05}s">
                    <img src="${photo.url}" alt="${photo.title || 'Foto Galeria'}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-6">
                        <h4 class="text-white font-serif text-lg italic">${photo.title || 'Registro Profissional'}</h4>
                        <div class="h-[1px] w-8 bg-gold mt-2"></div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function openLightbox(url, title) {
            const modal = document.getElementById('lightbox-modal');
            const img = document.getElementById('lightbox-img');
            const titleEl = document.getElementById('lightbox-title');
            
            img.src = url;
            titleEl.innerText = title;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const modal = document.getElementById('lightbox-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Inicializar galeria
        renderGallery();
    </script>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoom-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fade-in 0.8s ease-out forwards;
        }
        .animate-zoom-in {
            animation: zoom-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</body>
</html>
